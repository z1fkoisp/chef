name: kitchen
'on':
  pull_request_target:
    branches:
    - main
  push:
    branches:
    - main
  workflow_dispatch: null
concurrency:
  group: kitchen-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
permissions: {}
defaults:
  run:
    working-directory: kitchen-tests
jobs:
  workflow_guard:
    uses: chef/chef/.github/workflows/workflow-change-guard.yml@main
    permissions:
      contents: read
  win_x86_64:
    needs: workflow_guard
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
        - windows-2025
        - windows-2022
    runs-on: ${{ matrix.os }}
    env:
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.exec.windows.yml
      HAB_ORIGIN: gha
      HAB_BLDR_CHANNEL: base-2025
      HAB_REFRESH_CHANNEL: base-2025
      HAB_AUTH_TOKEN: ${{ secrets.HAB_AUTH_TOKEN }}
      HAB_LICENSE: accept-no-persist
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        persist-credentials: false
        clean: true
    - name: Install Habitat CLI
      shell: pwsh
      run: '$env:HAB_VERSION = "2.0.504"

        & "${{ github.workspace }}\.expeditor\scripts\ensure-minimum-viable-hab.ps1"

        $env:PATH = "C:\Program Files\Habitat;C:\hab\bin;C:\opscode\chef-workstation\bin;C:\opscode\chef-workstation\embedded\bin;"
        + $env:PATH

        echo "PATH=$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding
        utf8

        hab license accept

        hab --version

        '
    - name: Generate Habitat Origin Key
      shell: pwsh
      run: hab origin key generate "$env:HAB_ORIGIN"
    - name: Build Habitat Package
      shell: pwsh
      working-directory: .
      run: "# Build from repo root, not kitchen-tests\nWrite-Host \"I am in the following\
        \ directory before building: $(Get-Location)\"\n# cd ..\nhab pkg build habitat\n\
        $pkg_path = Get-ChildItem -Path \"results\" -Filter \"$env:HAB_ORIGIN-chef-infra-client-*.hart\"\
        \ |\n            Sort-Object LastWriteTime -Descending |\n            Select-Object\
        \ -First 1\n\nif ($pkg_path) {\n    Write-Host \"\u2713 Built package: $($pkg_path.Name)\"\
        \n} else {\n    Write-Error \"\xD7 No package built\"\n    Get-ChildItem -Path\
        \ \"results\" -ErrorAction SilentlyContinue\n    Exit 1\n}\n"
    - name: Install Chef Infra Client from Habitat Package
      shell: pwsh
      working-directory: .
      run: "# cd ..\n$pkg_path = Get-ChildItem -Path \"results\" -Filter \"$env:HAB_ORIGIN-chef-infra-client-*.hart\"\
        \ |\n            Sort-Object LastWriteTime -Descending |\n            Select-Object\
        \ -First 1\n\nWrite-Host \"Installing package: $($pkg_path.FullName)\"\n\n\
        hab pkg install $pkg_path.FullName --binlink --force\n\n# Verify installation\n\
        Write-Host \"Installed Chef Infra Client version:\"\nchef-client --version\n"
    - name: Install Chef Workstation (for kitchen CLI)
      shell: pwsh
      run: choco install -y chef-workstation
    - name: Kitchen Test
      shell: pwsh
      run: kitchen verify end-to-end-${{ matrix.os }}
  docr_lnx_x86_64:
    name: dokr_lnx_x86_64_hab
    needs: workflow_guard
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
        - amazonlinux-2023
        - almalinux-8
        - almalinux-9
        - almalinux-10
        - debian-11
        - debian-12
        - debian-13
        - fedora-42
        - opensuse-leap-15
        - oraclelinux-8
        - oraclelinux-9
        - oraclelinux-10
        - rockylinux-8
        - rockylinux-9
        - rockylinux-10
        - ubuntu-2204
        - ubuntu-2404
    runs-on: ubuntu-latest
    env:
      FORCE_FFI_YAJL: ext
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.dokken.yml
      HAB_ORIGIN: gha
      HAB_BLDR_CHANNEL: base-2025
      HAB_REFRESH_CHANNEL: base-2025
      HAB_AUTH_TOKEN: ${{ secrets.HAB_AUTH_TOKEN }}
      HAB_LICENSE: accept-no-persist
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        persist-credentials: false
        clean: true
    - name: Install Habitat CLI
      run: 'sudo -E ../.expeditor/scripts/install-hab.sh x86_64-linux

        sudo -E hab --version

        '
    - name: Install Test-Kitchen-Enterprise
      run: 'sudo -E hab pkg install --binlink --force chef/chef-test-kitchen-enterprise/2.0.12
        --channel unstable

        kitchen --version

        # chef-cli is needed for some kitchen operations

        sudo -E hab pkg install --binlink --force chef/chef-cli --channel unstable

        '
    - name: Install the kitchen-dokken driver latest to pick up docker fix
      run: 'sudo -E hab pkg exec chef/chef-test-kitchen-enterprise gem install kitchen-dokken
        --version 2.22.2

        '
    - name: Generate fake Habitat Origin Key
      run: 'hab origin key generate "$HAB_ORIGIN"

        # Export the keys for later use in the Docker container

        hab origin key export "$HAB_ORIGIN" > "$HAB_ORIGIN-key.tar.gz"

        '
    - name: Build Habitat Package (for testing purpose only)
      run: '# Move out of default kitchen-tests dir to the repo root

        cd ..

        hab pkg build .

        source ./results/last_build.env

        cp "./results/$pkg_artifact" kitchen-tests/chef-infra-client-latest.hart

        '
    - name: Set up HAB token file
      run: '# Create a token file that can be mounted into containers

        echo "${{ secrets.HAB_AUTH_TOKEN }}" > hab_token

        chmod 600 hab_token

        '
    - name: Kitchen Test
      run: '# Inspec integration tests are currently unstable within kitchen-test
        context due to hab and package changes between the projects... these will
        be turned back on as things finalize for a GA release

        # Use this when turning on Inspec integration tests

        # kitchen test end-to-end-${{ matrix.os }}


        # Run recipe convergence only

        kitchen converge end-to-end-${{ matrix.os }}

        kitchen destroy end-to-end-${{ matrix.os }}

        '
  docr_lnx_arm64:
    name: dokr_lnx_arm64_hab
    needs: workflow_guard
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
        - almalinux-9
        - almalinux-10
        - debian-11
        - debian-12
        - debian-13
        - fedora-42
        - opensuse-leap-15
        - oraclelinux-8
        - oraclelinux-9
        - rockylinux-9
        - rockylinux-10
        - ubuntu-2204
        - ubuntu-2404
    runs-on: ubuntu-latest
    env:
      FORCE_FFI_YAJL: ext
      CHEF_LICENSE: accept-no-persist
      KITCHEN_LOCAL_YAML: kitchen.dokken.yml
      HAB_ORIGIN: gha
      HAB_BLDR_CHANNEL: base-2025
      HAB_REFRESH_CHANNEL: base-2025
      HAB_AUTH_TOKEN: ${{ secrets.HAB_AUTH_TOKEN }}
      HAB_LICENSE: accept-no-persist
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        persist-credentials: false
        clean: true
    - name: Install Habitat CLI
      run: 'sudo -E ../.expeditor/scripts/install-hab.sh aarch64-linux

        sudo -E hab --version

        '
    - name: Install Test-Kitchen-Enterprise
      run: 'sudo -E hab pkg install --binlink --force chef/chef-test-kitchen-enterprise/2.0.12
        --channel unstable

        kitchen --version

        sudo -E hab pkg install --binlink --force chef/chef-cli --channel unstable

        '
    - name: Install the kitchen-dokken driver latest to pick up docker fix
      run: 'sudo -E hab pkg exec chef/chef-test-kitchen-enterprise gem install kitchen-dokken
        --version 2.22.2

        '
    - name: Generate fake Habitat Origin Key
      run: 'hab origin key generate "$HAB_ORIGIN"

        hab origin key export "$HAB_ORIGIN" > "$HAB_ORIGIN-key.tar.gz"

        '
    - name: Build Habitat Package (for testing purpose only)
      run: 'cd ..

        hab pkg build .

        source ./results/last_build.env

        cp "./results/$pkg_artifact" kitchen-tests/chef-infra-client-latest.hart

        '
    - name: Set up HAB token file
      run: 'echo "${{ secrets.HAB_AUTH_TOKEN }}" > hab_token

        chmod 600 hab_token

        '
    - name: Kitchen Test
      run: 'kitchen converge end-to-end-${{ matrix.os }}

        kitchen destroy end-to-end-${{ matrix.os }}

        '
